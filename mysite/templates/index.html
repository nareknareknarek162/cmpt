<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-light bg-light px-3">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Competition</a>
         <div class="d-flex align-items-center" id="authentication">
            <a href="{% url 'auth' %}" class="me-2">
                <button class="btn btn-primary">Войти</button>
            </a>
            <a href="{% url 'registration' %}">
                <button class="btn btn-secondary">Зарегистрироваться</button>
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-start">

        <!-- Фото -->
        <div class="flex-grow-1 pe-4">
            <h1 class="pb-3">Конкурс</h1>
            <div class="row" id="photos-container">
            </div>
        </div>

        <form method="GET" action="{% url 'index' %}" id="photo-form">
            <!-- Сортировка -->
            <div class="ms-3 d-flex flex-column">
                {% csrf_token %}
                <fieldset>
                    <legend>Отсортировать по:</legend>
                    <div>
                        <label>
                            <input type="radio" name="sort" value="date" checked />
                            Дате
                        </label>
                    </div>

                    <div>
                        <label>
                            <input type="radio" name="sort" value="likes"/>
                            Лайкам
                        </label>
                    </div>

                    <div>
                        <label>
                            <input type="radio" name="sort" value="comments"/>
                            Комментариям
                        </label>
                    </div>
                </fieldset>

                <hr class="divider">

                <fieldset>
                    <div>
                        <label>
                            <input type="radio" name="order" value="-" checked/>
                            Убыванию
                        </label>
                    </div>

                    <div>
                        <label>
                            <input type="radio" name="order" value=""/>
                            Возрастанию
                        </label>
                    </div>
                </fieldset>

                <!--фильтр-->
                <fieldset>
                    <legend>Искать по:</legend>

                    <input type="text" name="search" class="form-control mb-2"
                           placeholder="Поиск...">
                </fieldset>

                <button type="submit" class="btn btn-success w-100">Применить</button>
            </div>
        </form>
    </div>
</div>

<!-- Пагинация -->
<div>
    <ul class="pagination justify-content-center" id="pagination"></ul>
</div>
<footer class="bg-dark text-white text-center py-3 fixed-bottom">
    © 2025 Competition.org
</footer>
<script>
function fetchPhotos(page=1) {
    const apiURL = 'http://127.0.0.1:8000/api/photo/';

    const form = document.getElementById("photo-form");

    const formData = new FormData(form);
    const search = formData.get('search');
    const sort = formData.get('sort');
    const order = formData.get('order');

    const params = new URLSearchParams();
    params.append("sort", sort);
    params.append("order", order);
    if (search) params.append("search", search);
    params.append("page", page);

    fetch(`${apiURL}?${params.toString()}`, {
            method: "GET"
        })
        .then(response => {
            if (!response.ok) {
                throw new Error(response.statusText);
            }
            return response.json();
        })
        .then(data => {

            const container = document.getElementById("photos-container");
            container.innerHTML = "";

            data["results"].forEach(photo => {

                const html = `
                <div class="col-6 col-md-4 mb-3">
                    <a href="/photo/${photo.id}/">
                        <img src="${photo.image}"
                             title="${photo.description}"
                             class="img-fluid rounded"
                             style="max-width:200px;">
                    </a>
                </div>
            `;

                container.innerHTML += html;
            });
            const pagination = document.getElementById("pagination");
            pagination.innerHTML = "";
            if (data.pagination.prev_page != null) {
                pagination.innerHTML += `<li class="page-item">
                                        <a class="page-link" href="#" data-page="1">&laquo;</a>
                                      </li>
                                      <li class="page-item">
                                        <a class="page-link" href="#" data-page="${data.pagination.prev_page}">Предыдущая</a>
                                      </li>`;
            }

            pagination.innerHTML += `<li class= "page-item active"><span class="page-link">${data.pagination.current_page}</span></li>`;

            if (data.pagination.next_page != null) {
                pagination.innerHTML += `<li class="page-item">
                                    <a class="page-link" href="#" data-page="${data.pagination.next_page}">Следующая</a>
                                  </li>
                                  <li class="page-item">
                                    <a class="page-link"} href="#" data-page="${data.pagination.total_pages}">&raquo;</a>
                                  </li>`;
            }

        })
        .catch(error => {
            console.error(error);
        });
}

document.addEventListener("DOMContentLoaded", () => {
    fetchPhotos();
});

document.addEventListener("submit", function(e) {
    e.preventDefault();
    fetchPhotos();
});

document.addEventListener("click", (e) => {
    const link = e.target.closest("a.page-link");
    if (!link) return;

    e.preventDefault();

    const page = link.dataset.page;

    if (page) {
        fetchPhotos(page);
    }
});
</script>

<script>
function isAuthenticated() {
    const apiURL = "http://127.0.0.1:8000/api/user/current/";
    const access_token = localStorage.getItem("access_token");

    if (access_token) {
        fetch(apiURL, {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + access_token
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(response.statusText);
                }
                return response.json();
            })
            .then(data => {

                const container = document.getElementById("authentication");

                container.innerHTML = `
                <button type="submit" class="btn btn-danger" id="logoutBtn">Выйти</button>
                <a href="{% url 'account' %}" class="me-3">
                    <button class="btn btn-primary">Личный кабинет</button>
                </a>
                <div class="border-start ps-3 fs-5 text-success">
                    ${data.username}
                </div>`;
            })
            .catch(error => {
                console.error(error);
            });
    }
}
document.addEventListener("DOMContentLoaded", () => {
    isAuthenticated();
});

document.addEventListener("click", function(event) {

    if (event.target.id === "logoutBtn") {

        localStorage.removeItem("access_token");
        localStorage.removeItem("refresh_token");
        const container = document.getElementById("authentication").innerHTML = `<a href="{% url 'auth' %}" class="me-2">
                <button class="btn btn-primary">Войти</button>
            </a>
            <a href="{% url 'registration' %}">
                <button class="btn btn-secondary">Зарегистрироваться</button>
            </a>`;
    }

});
</script>
</body>
</html>
