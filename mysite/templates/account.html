<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Личный кабинет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Competition</a>
    </div>
</nav>
<div class="container mb-4">
    <h5 class="mb-3">Добавить фото</h5>
    <div class="card p-4 shadow-sm border-0">
        <a href="{% url 'add-photo' %}">
            <button class="btn btn-primary rounded-pill px-4 py-2">
                Загрузить фото
            </button>
        </a>
    </div>
</div>
<div class="d-flex justify-content-end pe-5">
  <select class="form-select w-auto" id="state">
    <option value="approved">Опубликованные фото</option>
    <option value="on_moderation">На модерации</option>
    <option value="on_delete">Фото к удалению</option>
  </select>
</div>
<div class="container mb-4">
    <h5 class="mb-3">Мои фотографии</h5>
    <div class="row" id="photos">
    </div>
</div>
<script>
const select = document.getElementById("state");
let photosData = []; // храним данные после fetch

function renderPhotos(data, status) {
    const container = document.getElementById("photos");
    container.innerHTML = "";

    data.forEach(photo => {
        if (photo.state === status) {
            const html = `
         <div class="col-6 col-md-4 mb-3">
          <div class="position-relative d-inline-block">
            <a href="http://127.0.0.1:8000/photo/${photo.id}/">
            <img src="${photo.image}"
                 title="${photo.description}"
                 class="img-fluid rounded"
                 style="max-width:200px;">
            </a>
            <div class="dropdown position-absolute top-0 end-0">
              <button class="btn btn-sm btn-light" data-bs-toggle="dropdown">
                ⋮
              </button>

              <ul class="dropdown-menu">
                <li><button class="dropdown-item delete-btn" data-id="${photo.id}">Удалить</button></li>
                <li><button class="dropdown-item delete-btn" data-id="${photo.id}">Редактировать</button></li>
              </ul>
            </div>
          </div>
        </div>
            `;
            container.innerHTML += html;
        }
    });
}

function fetchPhotos() {
    const apiURL = 'http://127.0.0.1:8000/api/photo/?mine=true';
    let access_token = localStorage.getItem("access_token");

    fetch(apiURL, {
        method: "GET",
        headers: {
            "Authorization": `Bearer ${access_token}`
        }
    })
    .then(response => {
        if (!response.ok) {
            throw new Error(response.statusText);
        }
        return response.json();
    })
    .then(data => {
        photosData = data; // сохраняем
        renderPhotos(photosData, select.value); // первый рендер
    })
    .catch(error => {
        console.error(error);
    });
}


select.addEventListener("change", (e) => {
    const status = e.target.value;
    renderPhotos(photosData, status);
});

document.addEventListener("DOMContentLoaded", () => {
    fetchPhotos();
});
</script>
</body>
</html>
