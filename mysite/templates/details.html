<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Competition</a>
        <div class="d-flex align-items-center" id="authentication">
            <a href="{% url 'auth' %}" class="me-2">
                <button class="btn btn-primary">Войти</button>
            </a>
            <a href="{% url 'registration' %}">
                <button class="btn btn-secondary">Зарегистрироваться</button>
            </a>
        </div>
    </div>
</nav>

<div id="photo"></div>
<br>
<form method="POST" class="text-center mt-3">
    {% csrf_token %}
    {% if is_liked %}
    <button type="submit" class="btn btn-primary" name="like">Убрать лайк</button>
    {% else %}
    <button type="submit" class="btn btn-primary" name="like">Лайк</button>
    {% endif %}
</form>

<p class="text-center mt-2" id="likes"></p>

<!-- комментарии -->
<div class="container mt-3">
    <div class="d-flex flex-column align-items-center">
        <button type="button" class="btn btn-warning text-white create-comment" data-bs-toggle="modal" data-bs-target="#myModal">
          Оставить комментарий
        </button>

        <!-- окно -->
        <div class="modal fade" id="myModal" tabindex="-1" aria-labelledby="myModalLabel" aria-hidden="true">
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title" id="myModalLabel">Ваш комментарий</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
              </div>
              <div class="modal-body">
                <textarea class="form-control" id="comment_text" rows="5" placeholder="Введите текст..."></textarea>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-success" id="sendCommentBtn">Отправить</button>
              </div>
            </div>
          </div>
        </div>
        <p class="fw-semibold mb-1" id="comments-amount"></p>
        <div class="d-flex flex-column align-items-start" id="comments"></div>
    </div>
</div>
{% load static %}
<script src="{% static 'js/details.js' %}"></script>
</body>
</html>
