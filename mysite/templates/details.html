<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Competition</a>
        <div class="d-flex align-items-center" id="authentication">
            <a href="{% url 'auth' %}" class="me-2">
                <button class="btn btn-primary">Войти</button>
            </a>
            <a href="{% url 'registration' %}">
                <button class="btn btn-secondary">Зарегистрироваться</button>
            </a>
        </div>
    </div>
</nav>

<div id="photo"></div>
<br>
<form method="POST" class="text-center mt-3">
    {% csrf_token %}
    {% if is_liked %}
    <button type="submit" class="btn btn-primary" name="like">Убрать лайк</button>
    {% else %}
    <button type="submit" class="btn btn-primary" name="like">Лайк</button>
    {% endif %}
</form>

<p class="text-center mt-2" id="likes"></p>

<!-- комментарии -->
<div class="container mt-3">
    <div class="d-flex flex-column align-items-center">
        <div>
            {% if user.is_authenticated %}
                <form method="POST">
                    {% csrf_token %}
                    <textarea id="text_input_update" name="comment_text" rows="5" cols="80"></textarea>
                    <button id="update_btn" type="submit" class="btn btn-success w-50 mx-auto d-block" name="comment"
                            value="update">Сохранить</button>
                </form>
            {% endif %}
        </div>
        <p class="fw-semibold mb-1" id="comments-amount"></p>
        <div class="d-flex flex-column align-items-start" id="comments"></div>
    </div>
</div>
<script>
    const input = document.getElementById('text_input');
    const input_update = document.getElementById('text_input_update');
    const btn_send = document.getElementById('send_btn');
    const btn_update = document.getElementById('update_btn');

    if (input) {
        input.addEventListener('input', () => {
            const hasText = input.value.trim().length > 0;
            btn_send.disabled = !hasText;
        });
    }

    if (input_update) {
        input_update.addEventListener('input', () => {
            const hasText = input_update.value.trim().length > 0;
            btn_update.disabled = !hasText;
        });
    }
</script>
<script>
function fetchPhoto() {
    const photoId = window.location.pathname.split("/")[2];
    const apiURL = `http://127.0.0.1:8000/api/photo/${photoId}/`;


    fetch(apiURL, {
        method: "GET"
    })
    .then(response => {
        if (!response.ok) {
            throw new Error(response.statusText);
        }
        return response.json();
    })
    .then(data => {

        const container = document.getElementById("photo");

        const html = `
            <p class="text-center fw-semibold fs-2">{{ photo.title }}</p>
            <img src="{{ photo.image.url }}" class="rounded mx-auto d-block">
            <p class="text-center">{{ photo.description }}</p>
            <p class="text-center">Автор: {{photo.author}}</p>
            <p class="text-center">Загружено: {{photo.publication_date}}</p>
            `;
        container.innerHTML += html;


    })
    .catch(error => {
        console.error(error);
    });
}

document.addEventListener("DOMContentLoaded", () => {
    fetchPhoto();
});
</script>

<script>
function fetchLikes() {
    const id = window.location.pathname.split("/")[2];
    const apiURL = `http://127.0.0.1:8000/api/like/photo/${id}/list/`;


    fetch(apiURL, {
        method: "GET"
    })
    .then(response => {
        return response.json();
    })
    .then(data => {

        const container = document.getElementById("likes");

        const html = `<p>Всего лайков ${data.length}</p>`;
        container.innerHTML = html;


    })
    .catch(error => {
        console.error(error);
    });
}

document.addEventListener("DOMContentLoaded", () => {
    fetchLikes();
});
</script>

<script>
function fetchComments() {
    const id = window.location.pathname.split("/")[2];
    const apiURL = `http://127.0.0.1:8000/api/comment/photo/${id}/list/`;

    fetch(apiURL, { method: "GET" })
        .then(response => response.json())
        .then(data => {
            const commentsContainer = document.getElementById("comments");
            let html = "";

            data.forEach(comment => {
                html += `
                    <div class="card mb-1 mt-2">
                        <div class="card-body position-relative pe-5">

                            <div class="dropdown position-absolute top-0 end-0 m-2">
                                <button
                                    class="btn btn-sm text-muted p-0"
                                    data-bs-toggle="dropdown"
                                    style="width: 32px; height: 32px;">
                                    <i class="bi bi-three-dots-vertical fs-5"></i>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end">
                                    <li>
                                        <button class="dropdown-item edit-comment" data-id="${comment.id}">
                                            Редактировать
                                        </button>
                                    </li>
                                    <li>
                                        <button class="dropdown-item text-danger delete-comment" data-id="${comment.id}">
                                            Удалить
                                        </button>
                                    </li>
                                </ul>
                            </div>

                            <h6 class="card-subtitle mb-1 text-muted">
                                ${comment.author} | ${comment.created_at}
                            </h6>

                            <p class="card-text">${comment.text}</p>

                        </div>
                    </div>
                `;
            });

            commentsContainer.innerHTML = html;
        })
        .catch(error => console.error(error));
}

document.addEventListener("DOMContentLoaded", fetchComments);
</script>
<script>
function isAuthenticated() {
    const apiURL = "http://127.0.0.1:8000/api/user/current/";
    const access_token = localStorage.getItem("access_token");

    if (access_token) {
        fetch(apiURL, {
            method: "GET",
            headers: {
                "Authorization": "Bearer " + access_token
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error(response.statusText);
            }
            return response.json();
        })
        .then(data => {

            const container = document.getElementById("authentication");

            container.innerHTML = `
                <button type="submit" class="btn btn-danger" id="logoutBtn">Выйти</button>
                <a href="{% url 'account' %}" class="me-3">
                    <button class="btn btn-primary">Личный кабинет</button>
                </a>
                <div class="border-start ps-3 fs-5 text-success">
                    ${data.username}
                </div>`;
        })
        .catch(error => {
            console.error(error);
        });
    }
}
document.addEventListener("DOMContentLoaded", () => {
    isAuthenticated();
});

document.addEventListener("click", function(event) {

    if (event.target.id === "logoutBtn") {

        localStorage.removeItem("access_token");
        localStorage.removeItem("refresh_token");
        const container = document.getElementById("authentication").innerHTML = `<a href="{% url 'auth' %}" class="me-2">
                <button class="btn btn-primary">Войти</button>
            </a>
            <a href="{% url 'registration' %}">
                <button class="btn btn-secondary">Зарегистрироваться</button>
            </a>`;
    }

});
</script>
</body>
</html>
