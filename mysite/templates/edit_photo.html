<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактировать фото</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Редактировать фото</h2>
    <form enctype="multipart/form-data" class="mt-3">
        {% csrf_token %}

        <div class="mb-3" style="text-align:center;">
            <label class="form-label">Текущее фото</label>
            <img id="photo-preview" src="" alt="Превью фото" style="display:block; margin:10px auto;">
        </div>

        <div class="mb-3">
            <label class="form-label">Новое фото (опционально)</label>
            {{form.image}}
            <div id="image-error" class="invalid-feedback" style="display: none;">
            Пожалуйста, выберите изображение (JPG, PNG, WebP). Выбранный файл не подходит.
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Название</label>
            {{form.title}}
        </div>

        <div class="mb-3">
            <label class="form-label">Описание</label>
            {{form.description}}
        </div>

        <button type="submit" class="btn btn-success">Редактировать</button>
    </form>
</div>

{% load static %}
<script src="{% static 'js/edit_photo.js' %}"></script>
</body>
</html>
